model:
  name: unetpp
  task: semantic
  in_channels: 3
  num_classes: 1
  base_channels: 32
  deep_supervision: false

paths:
  processed_root: dataset/processed
  splits_dir: dataset/splits
  output_dir: outputs/unetpp

input:
  image_size: [512, 1024]
  grayscale: false

training:
  epochs: 120
  batch_size: 4
  num_threads: 1
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.00001
  threshold: 0.5
  seed: 42
  amp: true
  patience: 25

loss:
  name: bce_dice
  dice_weight: 1.0
  bce_weight: 1.0

postprocessing:
  min_area: 20
  threshold: 0.5

augmentation:
  enabled: true
  horizontal_flip_p: 0.5
  shift_scale_p: 0.4
  shift_limit: 0.03
  scale_limit: 0.05
  brightness_contrast_p: 0.5
  brightness_limit: 0.12
  contrast_limit: 0.12
  gamma_p: 0.3
  gamma_limit: [0.90, 1.10]
  gaussian_noise_p: 0.3
  noise_std_limit: [0.005, 0.030]
  gaussian_blur_p: 0.15
  blur_kernel_size: 3
